name: Prepare Release PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: viceme-cli-release-pr
  cancel-in-progress: true

jobs:
  prepare:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.base_ref == 'main' &&
       github.head_ref == 'dev' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.head.ref == 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - id: release-app-token
        name: Create repository-scoped Release App token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
      - id: release-app-user
        name: Resolve Release App bot identity
        env:
          APP_SLUG: ${{ steps.release-app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >>"${GITHUB_OUTPUT}"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          ref: dev
          fetch-depth: 0
      - name: Fetch stable branch and release tags
        run: git fetch origin main --tags
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Compute version, CHANGELOG, and generated release contracts
        run: make release-prepare
      - name: Verify prepared release
        run: |
          make check
          make npm-package-check
          git diff --check
      - id: release
        name: Commit prepared release to protected dev
        env:
          APP_SLUG: ${{ steps.release-app-token.outputs.app-slug }}
          APP_USER_ID: ${{ steps.release-app-user.outputs.user-id }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          PUSHED=false
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add \
            CHANGELOG.md \
            package.json \
            package-lock.json \
            internal/buildinfo/buildinfo.go \
            skills/viceme/skill-package.json \
            skills/viceme/references/command-manifest.json \
            quality/release-manifest.json
          if ! git diff --cached --quiet; then
            git commit --message "chore(release): ${TAG}"
            git push origin HEAD:dev
            PUSHED=true
          fi
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "sha=$(git rev-parse HEAD)"
            echo "pushed=${PUSHED}"
          } >>"${GITHUB_OUTPUT}"
      - name: Create or update dev to main Release PR
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY_FILE="${RUNNER_TEMP}/release-pr.md"
          {
            echo "## Automated release"
            echo
            echo "This PR promotes the reviewed CLI changes from \`dev\` to \`main\` and releases **${TAG}** when merged."
            echo
            echo "The release preparation workflow automatically:"
            echo
            echo "- selected the semantic version from Conventional Commits;"
            echo "- updated npm, Go, bundled Skill, command manifest, digests, and compatibility metadata;"
            echo "- generated \`CHANGELOG.md\`;"
            echo "- passed \`make check\` and \`make npm-package-check\`."
            echo "- committed the generated files to protected \`dev\` as the dedicated ViceMe Release App."
            echo
            echo "Prepared head: \`${RELEASE_SHA}\`  "
            echo "Evidence: ${RUN_URL}"
            echo
            echo "> Merging is the release approval: GitHub Actions creates the tag, GitHub Release and platform assets, publishes npm, and sends the Feishu summary automatically."
          } >"${BODY_FILE}"

          PR_URL="$(gh pr list --state open --base main --head dev --json url --jq '.[0].url // empty')"
          if [[ -z "${PR_URL}" ]]; then
            gh pr create --base main --head dev --title "chore(release): ${TAG}" --body-file "${BODY_FILE}"
          else
            gh pr edit "${PR_URL}" --title "chore(release): ${TAG}" --body-file "${BODY_FILE}"
          fi
