name: Prepare Release PR

on:
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - closed
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: viceme-cli-release-pr
  cancel-in-progress: true

jobs:
  prepare:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action != 'closed' &&
       github.base_ref == 'main' &&
       github.head_ref == 'dev' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.head.ref == 'dev') ||
      (github.event.action == 'closed' &&
       github.event.pull_request.merged == true &&
       github.base_ref == 'dev' &&
       github.head_ref == 'release/prepare' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: dev
          fetch-depth: 0
      - name: Fetch stable branch and release tags
        run: git fetch origin main --tags
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Compute version, CHANGELOG, and generated release contracts
        run: make release-prepare
      - name: Verify prepared release
        run: |
          make check
          make npm-package-check
          git diff --check
      - id: release
        name: Commit prepared release to the preparation branch
        env:
          RELEASE_PREPARE_BRANCH: release/prepare
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          PREPARED=false
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            CHANGELOG.md \
            package.json \
            package-lock.json \
            internal/buildinfo/buildinfo.go \
            skills/viceme/skill-package.json \
            skills/viceme/references/command-manifest.json \
            quality/release-manifest.json
          if ! git diff --cached --quiet; then
            git commit --message "chore(release): ${TAG}"
            git fetch origin "refs/heads/${RELEASE_PREPARE_BRANCH}:refs/remotes/origin/${RELEASE_PREPARE_BRANCH}" || true
            git push --force-with-lease origin "HEAD:refs/heads/${RELEASE_PREPARE_BRANCH}"
            PREPARED=true
          fi
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "sha=$(git rev-parse HEAD)"
            echo "prepared=${PREPARED}"
            echo "branch=${RELEASE_PREPARE_BRANCH}"
          } >>"${GITHUB_OUTPUT}"
      - name: Run quality gates for the preparation branch
        if: steps.release.outputs.prepared == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref "${{ steps.release.outputs.branch }}"
      - name: Create or update the Release preparation PR
        if: steps.release.outputs.prepared == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RELEASE_PREPARE_BRANCH: ${{ steps.release.outputs.branch }}
          SOURCE_PR_URL: ${{ github.event.pull_request.html_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY_FILE="${RUNNER_TEMP}/release-prepare-pr.md"
          {
            echo "## Automated release preparation"
            echo
            echo "This PR was created only after the maintainer opened ${SOURCE_PR_URL:-a dev-to-main Release PR}."
            echo "It writes the generated **${TAG}** release metadata back to \`dev\` before the original Release PR is merged."
            echo
            echo "Generated files include the version, \`CHANGELOG.md\`, bundled Skill metadata, command manifest, and release digests."
            echo
            echo "Prepared head: \`${RELEASE_SHA}\`  "
            echo "Evidence: ${RUN_URL}"
            echo
            echo "> Merge this preparation PR after its required review and checks pass. The original \`dev\` to \`main\` PR will then update automatically and become the production release gate."
          } >"${BODY_FILE}"

          PR_URL="$(gh pr list --state open --base dev --head "${RELEASE_PREPARE_BRANCH}" --json url --jq '.[0].url // empty')"
          if [[ -z "${PR_URL}" ]]; then
            gh pr create --base dev --head "${RELEASE_PREPARE_BRANCH}" --title "chore(release): prepare ${TAG}" --body-file "${BODY_FILE}"
          else
            gh pr edit "${PR_URL}" --title "chore(release): prepare ${TAG}" --body-file "${BODY_FILE}"
          fi
      - name: Create or update dev to main Release PR
        if: steps.release.outputs.prepared != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY_FILE="${RUNNER_TEMP}/release-pr.md"
          {
            echo "## Automated release"
            echo
            echo "This PR promotes the reviewed CLI changes from \`dev\` to \`main\` and releases **${TAG}** when merged."
            echo
            echo "The release preparation workflow automatically:"
            echo
            echo "- selected the semantic version from Conventional Commits;"
            echo "- updated npm, Go, bundled Skill, command manifest, digests, and compatibility metadata;"
            echo "- generated \`CHANGELOG.md\`;"
            echo "- passed \`make check\` and \`make npm-package-check\`."
            echo
            echo "Prepared head: \`${RELEASE_SHA}\`  "
            echo "Evidence: ${RUN_URL}"
            echo
            echo "> Merging is the release approval: GitHub Actions creates the tag, GitHub Release and platform assets, publishes npm, and sends the Feishu summary automatically."
          } >"${BODY_FILE}"

          PR_URL="$(gh pr list --state open --base main --head dev --json url --jq '.[0].url // empty')"
          if [[ -z "${PR_URL}" ]]; then
            gh pr create --base main --head dev --title "chore(release): ${TAG}" --body-file "${BODY_FILE}"
          else
            gh pr edit "${PR_URL}" --title "chore(release): ${TAG}" --body-file "${BODY_FILE}"
          fi
